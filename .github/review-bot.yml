# ReviewBot per-repository configuration
#
# Copy this file to .github/review-bot.yml in any repository where ReviewBot is installed.
# All fields are optional — omit any field to use the default shown in the comment.
#
# Full reference: https://github.com/your-org/ReviewBot/blob/main/docs/configuration.md

# Set to false to disable ReviewBot for this repository without uninstalling the GitHub App.
# Default: true
enabled: true

model:
  # LLM provider. One of: "anthropic", "openai"
  # "openai" also works for any OpenAI-compatible endpoint (Ollama, vLLM, LM Studio, etc.)
  # Configure OpenAI-compatible response formatting on the ReviewBot host with
  # REVIEWBOT__OpenAi__ResponseFormat=json_object|json_schema|text.
  # Default: anthropic
  provider: openai

  # Model name passed to the provider API.
  # Omitted on purpose: reviews in this repo use the model configured on the host via
  # REVIEWBOT__OpenAi__ModelName. Set `name:` here to pin a specific model instead.

review:
  # Post inline comments on individual diff lines.
  # Default: true
  inline_comments: true

  # Post a top-level review summary.
  # Default: true
  summary: true

  # Maximum number of changed files to include in the review.
  # Files are sorted alphabetically; the first max_files are kept.
  # Default: 50
  max_files: 50

  # Maximum diff lines per individual file before the patch is truncated with a note.
  # When the total patch lines across all files exceed max_patch_lines * 5, the
  # smallest-diff files are prioritised and larger ones are skipped. A note is appended
  # to the review summary listing the skipped files.
  # Default: 1500
  max_patch_lines: 1500

  # Minimum confidence level for inline comments to be posted. Comments below this
  # threshold are silently dropped before posting. "low" posts everything; "high" posts
  # only comments the model is certain about.
  # One of: low, medium, high. Default: low
  #min_confidence: medium

  trigger:
    # Review when the bot is explicitly added as a reviewer on the PR.
    # Default: true
    on_review_request: true

    # Review on every push to the PR branch.
    # Default: false
    on_push: false

retrieval:
    # Deterministic repository-context retrieval: a SQLite symbol index built per
    # head SHA, from which definitions and top callers referenced by the diff are
    # injected as review context (bounded by the prompt budget).
    # Default: true
    enabled: true

    # Maximum retrieved context bytes to include in a review.
    max_bytes: 51200

    # Symbol lookup mode: callers, definitions, or both.
    symbol_lookup_depth: both

    # Embedding retrieval lane.
    embeddings: false

    # Disk location for the per-SHA repository index cache.
    index_cache_dir: ./cache/reviewbot/index

# Glob patterns for files to exclude from the review.
# Uses Microsoft.Extensions.FileSystemGlobbing syntax (forward slashes, ** for any depth).
# Default: [] (no files excluded)
ignore:
  - "**/*.generated.cs"
  - "**/*.Designer.cs"
  - "migrations/**"
  - "*.lock"
  - "docs/**"

# Areas the LLM is asked to focus on. Included verbatim in the system prompt.
# Default: [correctness, security, concurrency, error_handling]
focus:
  - correctness
  - security
  - concurrency
  - error_handling

# Free-form instructions appended to the system prompt verbatim.
# Use this for project-specific conventions, languages, or frameworks.
# Default: "" (no extra instructions)
instructions: |
  This is a C# / .NET 10 codebase (ASP.NET Core, EF Core SQLite, xUnit).
  - Treat `using var` and `using` blocks as guaranteeing Dispose() in all code paths.
  - Only flag security issues at real trust boundaries (HTTP request fields, external API
    responses, user-uploaded content). Do not flag internal parameters passed between
    layers of the same service as injection or path traversal risks.
  - Do not comment on code style or formatting — .NET analyzers and EditorConfig enforce
    style in CI.

# Language grounding — inject verified project metadata into the review prompt so the
# model cannot reason from stale training-data assumptions (e.g. treating .NET 10 as
# "on the roadmap" rather than the current runtime).
grounding:
  # Read project config files via the GitHub Contents API and inject facts into the prompt.
  # Tier 1 only. No cloning required, negligible latency overhead.
  # Default: true
  enabled: true

  # Clone the PR branch and run a build/type-check command. Proves syntax validity.
  # Tier 2. Adds clone + build time to the review latency.
  # Recommended only when running ReviewBot in a resource-limited container (see docs).
  # Default: false
  build: false

  # Build command to run. null = auto-detect from language (dotnet build / mypy / etc.)
  # Default: null
  # build_command: "dotnet build --no-restore -c Release"

  # Timeout for the build command in seconds.
  # Default: 120
  build_timeout_seconds: 120

  # Run the test suite during grounding. Proves behavioral correctness. Tier 3 (future).
  # Default: false
  tests: false

  # Test command to run. null = auto-detect from language.
  # Default: null
  # test_command: "dotnet test --no-build"

  # Timeout for the test command in seconds.
  # Default: 300
  test_timeout_seconds: 300
